name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Buildozer Action
        uses: Digreatbrian/buildozer-action@v1
        with:
          workdir: .
          buildozer_version: stable
